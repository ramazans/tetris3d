name: Publish to GitHub Pages

# Pages kaynağı gh-pages dalı: main'e her push'ta dal eşitlenir,
# GitHub'ın kendi "pages build and deployment" akışı siteyi yayınlar.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
