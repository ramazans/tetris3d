<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Stack Spin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 50% 35%, #fafafa 0%, #e9e9ec 60%, #d8d8dd 100%);
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }

  #hud {
    position: fixed; top: 12px; right: 12px; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 12px 16px; border-radius: 16px;
    background: rgba(255,255,255,.40); box-shadow: 0 2px 8px rgba(0,0,0,.12);
    backdrop-filter: blur(4px);
  }
  #hud .lbl {
    font-size: 12px; letter-spacing: .08em; color: #888;
    margin-top: 14px;
  }
  #hud .lbl:first-child { margin-top: 0; }
  #hud #nextCv { width: 60px; height: 38px; }
  #hud #scoreVal {
    font-size: 22px; font-weight: bold; color: #555;
    font-variant-numeric: tabular-nums;
  }
  #hud #timeVal {
    font-size: 18px; font-weight: bold; color: #555;
    font-variant-numeric: tabular-nums;
  }

  #overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(240,240,244,.55); backdrop-filter: blur(5px);
    text-align: center; padding: 20px; overflow-y: auto;
  }
  #overlay.hidden { display: none; }
  #overlay p { margin: 6px 0 22px; color: #666; font-size: 15px; line-height: 1.6; }
  #overlay .ovTitle {
    display: block; margin-bottom: 18px;
    font-family: ui-rounded, "SF Pro Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
    font-size: clamp(36px, 9vw, 52px); font-weight: 800;
    letter-spacing: .1em; color: #d6404e;
    text-shadow: 0 2px 0 rgba(0,0,0,.08);
  }
  #overlay .ovStats {
    display: flex; gap: 0; margin-bottom: 6px;
    padding: 16px 0; border-radius: 16px;
    background: rgba(255,255,255,.5); box-shadow: 0 2px 8px rgba(0,0,0,.12);
    backdrop-filter: blur(4px);
  }
  #overlay .stat {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 130px; padding: 0 18px;
  }
  #overlay .stat + .stat { border-left: 1px solid rgba(0,0,0,.10); }
  #overlay .stLbl { font-size: 12px; letter-spacing: .08em; color: #888; }
  #overlay .stVal {
    font-family: ui-rounded, "SF Pro Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
    font-size: 34px; font-weight: bold; color: #555;
    font-variant-numeric: tabular-nums;
  }
  #overlay button {
    font-size: 22px; font-weight: bold; color: #fff; cursor: pointer;
    padding: 14px 46px; border: none; border-radius: 40px;
    background: linear-gradient(180deg, #f04a55, #d41f2c);
    box-shadow: 0 6px 0 #9c141e, 0 10px 18px rgba(0,0,0,.18);
    transition: transform .08s;
  }
  #overlay button:active { transform: translateY(4px); box-shadow: 0 2px 0 #9c141e; }
  #overlay #ovBtn { margin: 30px 0; }
  /* start ekranı logosu (yalnızca açılışta görünür) */
  #overlay #ovLogo { display: block; width: clamp(230px, 62vw, 360px); height: auto; margin: 0 0 6px; pointer-events: none; }
  #overlay #ovLogo.hidden { display: none; }
  #overlay #ovExtra { display: flex; flex-direction: column; align-items: center; width: 100%; }

  #overlay .ovName {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    margin-top: 28px; margin-bottom: 14px; /* butonun üstündeki boşlukla eşit */
  }
  #overlay .ovName input {
    width: 200px; text-align: center;
    font-family: ui-rounded, "SF Pro Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
    font-size: 20px; font-weight: bold; color: #555;
    padding: 8px 12px; border: 1px solid rgba(0,0,0,.15); border-radius: 12px;
    background: rgba(255,255,255,.7); outline: none;
  }
  #overlay .ovName input:focus { border-color: #d6404e; }
  #overlay .ovName input::placeholder { color: #b7b7bd; font-weight: normal; }
  /* kutunun sağında küçük kaydet ikonu; absolute olduğu için kutunun hizasını bozmaz */
  #overlay .ovNameWrap { position: relative; display: inline-block; }
  #overlay .nameSave {
    position: absolute; left: 100%; top: 50%; transform: translateY(-50%);
    margin-left: 8px; width: 34px; height: 34px; padding: 0;
    border: none; border-radius: 50%; cursor: pointer;
    background: linear-gradient(180deg, #f04a55, #d41f2c);
    box-shadow: 0 3px 0 #9c141e, 0 5px 9px rgba(0,0,0,.18);
    color: #fff; font-size: 17px; font-weight: bold; line-height: 34px; text-align: center;
    transition: transform .08s;
  }
  #overlay .nameSave:active { transform: translateY(calc(-50% + 2px)); box-shadow: 0 1px 0 #9c141e; }
  #overlay .nameSave.hidden { display: none; }
  #overlay .ovRecords {
    display: flex; flex-direction: column; width: 320px; max-width: 86vw; margin-bottom: 20px;
    border-radius: 16px; overflow: hidden;
    background: rgba(255,255,255,.5); box-shadow: 0 2px 8px rgba(0,0,0,.12);
    backdrop-filter: blur(4px);
  }
  #overlay .recHead { display: flex; justify-content: center; border-bottom: 1px solid rgba(0,0,0,.08); }
  #overlay .recSel {
    appearance: none; -webkit-appearance: none; -moz-appearance: none;
    border: none; background: transparent; cursor: pointer;
    font-family: ui-rounded, "SF Pro Rounded", "Trebuchet MS", "Segoe UI", sans-serif;
    font-weight: bold; font-size: 13px; letter-spacing: .08em; color: #888;
    text-align: center; text-align-last: center;
    padding: 11px 24px 11px 16px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23999' stroke-width='1.5' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat; background-position: right 7px center;
  }
  #overlay .recSel:focus { outline: none; }
  #overlay .recList { display: flex; flex-direction: column; }
  #overlay .recRow {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 15px;
    line-height: 20px; /* boş ve dolu satırlar aynı yükseklikte kalsın */
  }
  #overlay .recEmptyName { color: #c9c9cf; font-weight: normal; }
  #overlay .recRow + .recRow { border-top: 1px solid rgba(0,0,0,.08); }
  #overlay .recRank { flex: 0 0 18px; text-align: center; font-size: 13px; font-weight: bold; color: #aaa; }
  #overlay .recName {
    flex: 1 1 auto; text-align: left; color: #555; font-weight: bold;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #overlay .recScore { flex: 0 0 auto; color: #555; font-weight: bold; font-variant-numeric: tabular-nums; }
  #overlay .recTime { flex: 0 0 44px; text-align: right; color: #999; font-size: 13px; font-variant-numeric: tabular-nums; }
  #overlay .recRow.recMine { background: rgba(214,64,78,.14); }
  #overlay .recRow.recMine .recName,
  #overlay .recRow.recMine .recScore,
  #overlay .recRow.recMine .recRank { color: #c02636; }
  #overlay .recEmpty { padding: 16px; color: #999; font-size: 14px; }
  /* basit skeleton: veri gelene kadar gri çubuklar */
  #overlay .skelBar {
    display: inline-block; height: 11px; border-radius: 5px; vertical-align: middle;
    background: rgba(0,0,0,.11); animation: skelPulse 1.2s ease-in-out infinite;
  }
  #overlay .recName .skelBar { width: 62%; }
  #overlay .recScore .skelBar { width: 34px; }
  @keyframes skelPulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { #overlay .skelBar { animation: none; } }
</style>
</head>

<script>
"use strict";

/* ================= Sabitler ================= */
const COLS = 18, ROWS = 12, GRID_H = ROWS + 5;
const DELTA = Math.PI * 2 / COLS;          // bir dilimin açısı
const R_IN = 2.40, R_OUT = 3.40;           // silindir iç/dış yarıçap (hücre ~küp oranında)
const R_MID = (R_IN + R_OUT) / 2, THICK = (R_OUT - R_IN) / 2;
const CELL_H = 1;
const GRAVITY_MS = 800, SOFT_MS = 45, LOCK_MS = 320, CLEAR_MS = 380, FALL_MS = 420;

// pastel palet — referans fotoğraftaki yumuşak tonlar (I ve O aynı aileden türetildi)
const PIECES = {
  I: { color: "#5fc4d4", cells: [[-1,0],[0,0],[1,0],[2,0]] },
  O: { color: "#f0c968", cells: [[0,0],[1,0],[0,1],[1,1]] },
  T: { color: "#b491e0", cells: [[-1,0],[0,0],[1,0],[0,1]] },
  S: { color: "#6fbf73", cells: [[-1,0],[0,0],[0,1],[1,1]] },
  Z: { color: "#e26b7c", cells: [[0,0],[1,0],[-1,1],[0,1]] },
  L: { color: "#eda45c", cells: [[-1,0],[0,0],[1,0],[1,1]] },
  J: { color: "#6f9ceb", cells: [[-1,0],[0,0],[1,0],[-1,1]] },
};

/* ================= Yardımcılar ================= */
const clamp = (v,a,b) => v < a ? a : v > b ? b : v;
const mod = (n,m) => ((n % m) + m) % m;

function hexToRgb(hex){
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function shade(hex, k){ // k>1 açar, k<1 koyulaştırır
  const [r,g,b] = hexToRgb(hex);
  const f = c => clamp(Math.round(k >= 1 ? c + (255-c)*(k-1) : c*k), 0, 255);
  return `rgb(${f(r)},${f(g)},${f(b)})`;
}
function easeOutCubic(x){
  return 1 - Math.pow(1 - x, 3);
}
function formatTime(sec){
  return `${Math.floor(sec/60)}:${String(Math.floor(sec%60)).padStart(2, "0")}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ================= Skor tablosu (Supabase REST — SDK'sız fetch) ================= */
// Boş bırakılırsa skor tablosu tamamen kapalıdır; oyun aynen çalışır.
const SUPA_URL = "https://lnftfovvzyntesibloov.supabase.co";
const SUPA_KEY = "sb_publishable_rNKiuEnqs1Bft0BCXZXymg_K2xYCkzw";
const SUPA_ON = !!(SUPA_URL && SUPA_KEY);

function supaHeaders(extra){
  return Object.assign({ apikey: SUPA_KEY, Authorization: "Bearer " + SUPA_KEY }, extra || {});
}

async function submitScore(name, sc, timeSec){
  if (!SUPA_ON || !name) return false;
  try {
    const res = await fetch(SUPA_URL + "/rest/v1/scores", {
      method: "POST",
      headers: supaHeaders({ "Content-Type": "application/json", Prefer: "return=minimal" }),
      body: JSON.stringify({ name: name.slice(0, 14), score: sc, time_seconds: timeSec }),
    });
    return res.ok;
  } catch (e) { return false; }
}

// dönem başlangıcı (oyuncunun yerel saatiyle) → ISO
function periodStart(kind){
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  if (kind === "week"){ const dow = (d.getDay() + 6) % 7; d.setDate(d.getDate() - dow); } // Pazartesi başı
  else if (kind === "month"){ d.setDate(1); }
  return d.toISOString();
}

// bir dönemin ilk N skoru → [{ name, score, time_seconds }, ...]
async function fetchTops(kind, limit = 3){
  let url = SUPA_URL + "/rest/v1/scores?select=name,score,time_seconds&order=score.desc,created_at.asc&limit=" + limit;
  if (kind !== "all") url += "&created_at=gte." + encodeURIComponent(periodStart(kind));
  try {
    const res = await fetch(url, { headers: supaHeaders() });
    if (!res.ok) return [];
    return await res.json();
  } catch (e) { return []; }
}

// dönem seçici (combobox — tasarım olarak düz metin gibi görünür) + ilk 3 liste
const REC_PERIODS = [["ALL-TIME", "all"], ["MONTHLY", "month"], ["WEEKLY", "week"], ["DAILY", "day"]];
// oyun sonu oturumunda kendi kaydımızı vurgulamak için
let goName = "", goScore = null, goTime = null;

function recordSkeletonRows(){
  // baştan itibaren sabit 3 satır → veri gelince boyut değişmez (ekran oynamaz)
  return [0, 1, 2].map(i =>
    `<span class="recRow">` +
      `<span class="recRank">${i + 1}</span>` +
      `<span class="recName"><span class="skelBar"></span></span>` +
      `<span class="recScore"><span class="skelBar"></span></span>` +
      `<span class="recTime"></span>` +
    `</span>`
  ).join("");
}
function recordsCardHtml(){
  return `<span class="ovRecords">` +
    `<span class="recHead"><select class="recSel" id="recSel">` +
      REC_PERIODS.map(([l, k]) => `<option value="${k}">${l}</option>`).join("") +
    `</select></span>` +
    `<span class="recList" id="recList">${recordSkeletonRows()}</span>` +
  `</span>`;
}
async function loadRecords(period){
  const list = document.getElementById("recList");
  if (!list) return;
  const rows = await fetchTops(period, 3);
  if (document.getElementById("recSel")?.value !== period) return; // seçim değiştiyse eski yanıtı yok say
  const slots = list.querySelectorAll(".recRow");
  slots.forEach((row, i) => {
    const r = rows[i];
    const mine = r && goName && r.name === goName && r.score === goScore && r.time_seconds === goTime;
    row.classList.toggle("recMine", !!mine);
    const nameEl = row.querySelector(".recName");
    nameEl.textContent = r ? r.name : "—";
    nameEl.classList.toggle("recEmptyName", !r);
    row.querySelector(".recScore").textContent = r ? r.score : "";
    row.querySelector(".recTime").textContent = r ? formatTime(r.time_seconds) : "";
  });
}

/* ================= Ses (Web Audio, klasik arcade — dosyasız sentez) ================= */
const Sfx = (() => {
  let ctx = null, master = null, noiseBuf = null, muted = false;

  function ensure(){
    if (!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.4;
      master.connect(ctx.destination);
      noiseBuf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random()*2 - 1;
    }
    if (ctx.state === "suspended") ctx.resume();
    return true;
  }

  // temel kalıp: osilatör + kazanç zarfı
  function tone({type="square", f0=440, f1=f0, dur=0.06, vol=0.12, delay=0}){
    if (muted || !ensure()) return;
    const t0 = ctx.currentTime + delay;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(Math.max(f0,1), t0);
    if (f1 !== f0) osc.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  }

  function click({dur=0.04, f=900, vol=0.2, delay=0}){
    if (muted || !ensure()) return;
    const t0 = ctx.currentTime + delay;
    const src = ctx.createBufferSource(); src.buffer = noiseBuf;
    const flt = ctx.createBiquadFilter(); flt.type = "lowpass"; flt.frequency.value = f;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(flt); flt.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur + 0.02);
  }

  return {
    unlock(){ ensure(); },
    // kule dönüşü: kısa blip
    move(){ tone({f0: 880, dur: 0.03, vol: 0.07}); },
    // parça döndürme: iki tonlu bi-dip
    rotate(){ tone({f0: 660, dur: 0.035, vol: 0.09}); tone({f0: 990, dur: 0.04, vol: 0.09, delay: 0.04}); },
    // kilitlenme: perküsif "tak"
    lock(){ click({dur: 0.045, f: 800, vol: 0.22}); },
    // hard drop: hızlı aşağı süpürme + tak
    drop(){ tone({f0: 600, f1: 150, dur: 0.07, vol: 0.10}); },
    // halka temizleme: kısa başarı arpeji (çoklu halkada bir oktav yukarı)
    ring(count = 1){
      const base = count >= 2 ? 1046.5 : 523.25; // C6 / C5
      const steps = [1, 1.25, 1.5, 2];           // C-E-G-C
      steps.forEach((m, i) => tone({f0: base*m, dur: 0.09, vol: 0.13, delay: i*0.08}));
    },
    // game over: inen üç ton
    over(){
      [400, 300, 200].forEach((f, i) => tone({f0: f, dur: 0.22, vol: 0.14, delay: i*0.24}));
    },
  };
})();

/* ================= Oyun durumu ================= */
let grid;               // grid[row][col] = null | hücre nesnesi
let piece = null;       // { key, color, cells, col, row, visRow }
let bag = [];
let nextKey = null;     // sıradaki parça (sağdaki önizlemede gösterilir)
let state = "start";    // start | playing | paused | gameover
let score = 0, rings = 0;
let gravAcc = 0, softDrop = false, lockT = 0, lockResets = 0;
let clearing = null;    // { rows:[...], t0 }
const FRONT = -Math.PI/2 - Math.PI/9; // parçanın indiği açı: tam karşı değil, 20° solda
let towerAngle = FRONT - 0.5*DELTA, towerTarget = towerAngle;
let lastTime = 0;

function newCell(color){
  return { color, fallFrom: 0, fallT: -9 };
}
function emptyGrid(){
  return Array.from({length: GRID_H}, () => Array(COLS).fill(null));
}
function nextFromBag(){
  if (bag.length === 0){
    bag = Object.keys(PIECES);
    for (let i = bag.length - 1; i > 0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }
  return bag.pop();
}

function frontColCont(){ // kameraya bakan sürekli (mod'suz) sütun indeksi
  return Math.round((FRONT - towerAngle)/DELTA - 0.5);
}

function collides(cells, col, row){
  for (const [dc, dr] of cells){
    const r = row + dr;
    if (r < 0) return true;
    if (r >= GRID_H) continue;
    if (grid[r][mod(col + dc, COLS)]) return true;
  }
  return false;
}

function spawnPiece(){
  if (!nextKey) nextKey = nextFromBag();
  const key = nextKey;
  nextKey = nextFromBag();
  drawNext();
  const p = PIECES[key];
  const col = frontColCont();
  const pc = { key, color: p.color, cells: p.cells.map(c => c.slice()), col, visCol: col, row: ROWS, visRow: ROWS + 0.8 };
  if (collides(pc.cells, pc.col, pc.row)) { gameOver(); return; }
  piece = pc;
  gravAcc = 0; lockT = 0; lockResets = 0;
  towerTarget = FRONT - (pc.col + 0.5)*DELTA;
}

function dropRow(){ // gölge (hayalet) satırı
  let r = piece.row;
  while (!collides(piece.cells, piece.col, r - 1)) r--;
  return r;
}

function tryMove(dir){
  if (!piece) return;
  if (!collides(piece.cells, piece.col + dir, piece.row)){
    piece.col += dir;
    towerTarget = FRONT - (piece.col + 0.5)*DELTA;
    Sfx.move();
    if (collides(piece.cells, piece.col, piece.row - 1) && lockResets < 2){ lockT = 0; lockResets++; }
  }
}

function tryRotate(){
  if (!piece) return;
  const rot = piece.cells.map(([dc, dr]) => [dr, -dc]);
  for (const kick of [0, 1, 2]){ // yerinde, 1 yukarı, 2 yukarı (I için)
    if (!collides(rot, piece.col, piece.row + kick)){
      piece.cells = rot; piece.row += kick;
      Sfx.rotate();
      if (collides(piece.cells, piece.col, piece.row - 1) && lockResets < 2){ lockT = 0; lockResets++; }
      return;
    }
  }
}

function hardDrop(){
  if (!piece) return;
  const target = dropRow();
  score += (piece.row - target) * 2;
  piece.row = target;
  Sfx.drop();
  lockPiece();
}

function lockPiece(){
  const now = performance.now()/1000;
  let overflow = false;
  for (const [dc, dr] of piece.cells){
    const r = piece.row + dr, c = mod(piece.col + dc, COLS);
    if (r >= ROWS) overflow = true;
    if (r >= 0 && r < GRID_H) grid[r][c] = newCell(piece.color);
  }
  Sfx.lock();
  piece = null;
  if (overflow){ gameOver(); return; }

  const full = [];
  for (let r = 0; r < GRID_H; r++){
    if (grid[r].every(c => c)) full.push(r);
  }
  if (full.length){
    clearing = { rows: full, t0: now };
    rings += full.length;
    score += [0, 100, 300, 500, 800][Math.min(full.length, 4)];
    Sfx.ring(full.length);
  } else {
    spawnPiece();
  }
}

function finishClear(){
  const now = performance.now()/1000;
  const rows = clearing.rows;
  clearing = null;
  const removed = new Set(rows);
  const newGrid = emptyGrid();
  let w = 0;
  for (let r = 0; r < GRID_H; r++){
    if (removed.has(r)) continue;
    const dropped = r - w;
    for (let c = 0; c < COLS; c++){
      const cell = grid[r][c];
      if (cell && dropped > 0){ cell.fallFrom = dropped; cell.fallT = now; }
      newGrid[w][c] = cell;
    }
    w++;
  }
  grid = newGrid;
  spawnPiece();
}

function gameOver(){
  state = "gameover";
  piece = null;
  Sfx.over();
  const finalScore = score, finalTime = Math.floor(elapsed);
  const savedName = (function(){ try { return localStorage.getItem("stackspin-name") || localStorage.getItem("cubiq-name") || ""; } catch (e) { return ""; } })().slice(0, 14);

  // ovMsg: başlık + skor kartı (butonun ÜSTÜNDE)
  const msg =
    `<span class="ovTitle">GAME OVER</span>` +
    `<span class="ovStats">` +
      `<span class="stat"><span class="stLbl">SCORE</span><span class="stVal">${finalScore}</span></span>` +
      `<span class="stat"><span class="stLbl">TIME</span><span class="stVal">${formatTime(finalTime)}</span></span>` +
    `</span>`;
  // ovExtra: isim kutusu + rekorlar (butonun ALTINDA)
  const extra = SUPA_ON
    ? `<span class="ovName"><span class="ovNameWrap">` +
        `<input id="ovNameInput" maxlength="14" placeholder="Your name" value="${escapeHtml(savedName)}" autocomplete="off">` +
        `<button id="ovNameSave" class="nameSave hidden" title="Save score" aria-label="Save score">✓</button>` +
      `</span></span>` +
      recordsCardHtml()
    : "";
  showOverlay(msg, "Play Again", extra);

  if (SUPA_ON){
    goName = ""; goScore = finalScore; goTime = finalTime;
    const sel = document.getElementById("recSel");
    // Daha önce seçilen rekor dönemini localStorage'dan geri yükle.
    const savedPeriod = (function(){ try { return localStorage.getItem("stackspin-period") || localStorage.getItem("cubiq-period") || ""; } catch (e) { return ""; } })();
    if (REC_PERIODS.some(([, k]) => k === savedPeriod)) sel.value = savedPeriod;
    sel.addEventListener("change", () => {
      try { localStorage.setItem("stackspin-period", sel.value); } catch (e) {}
      loadRecords(sel.value);
    });
    loadRecords(sel.value); // seçili dönemi hemen göster

    const input = document.getElementById("ovNameInput");
    const saveBtn = document.getElementById("ovNameSave");
    let submitted = false;
    const doSubmit = async () => {
      const nm = input.value.trim();
      if (submitted || !nm) return;
      submitted = true;
      saveBtn.classList.add("hidden");
      goName = nm.slice(0, 14);
      try { localStorage.setItem("stackspin-name", nm); } catch (e) {}
      await submitScore(nm, finalScore, finalTime);
      loadRecords(sel.value); // kendi skorumuzu dahil ederek yenile (vurgu)
    };
    // Oyuncu ismi değiştirdikçe localStorage'ı güncelle → bir sonraki oyun bu isimle kaydeder.
    // Skor henüz gönderilmediyse kutunun yanında ✓ (kaydet) butonunu göster.
    input.addEventListener("input", () => {
      const nm = input.value.trim();
      try {
        if (nm) localStorage.setItem("stackspin-name", nm);
        else { localStorage.removeItem("stackspin-name"); localStorage.removeItem("cubiq-name"); }
      } catch (e) {}
      saveBtn.classList.toggle("hidden", submitted || !nm);
    });
    input.addEventListener("keydown", e => { if (e.key === "Enter"){ e.preventDefault(); doSubmit(); input.blur(); } });
    saveBtn.addEventListener("click", doSubmit);
    // İsim daha önce kaydedilmişse (localStorage) skoru oyun biter bitmez otomatik gönder.
    // İlk kez oynayan / ismini henüz girmemiş oyuncu: isim yazınca beliren ✓ butonu (veya Enter) ile kaydeder.
    // Play Again skoru kaydetmez.
    if (savedName) doSubmit();
  }
}

function restart(){
  grid = emptyGrid();
  randomizeBaseColors();
  bag = []; nextKey = null; score = 0; rings = 0; elapsed = 0;
  clearing = null; softDrop = false;
  state = "playing";
  hideOverlay();
  spawnPiece();
}

/* ================= HUD: sıradaki parça (2D) + puan ================= */
const nextCv = document.getElementById("nextCv");
const nextCtx = nextCv.getContext("2d");
function drawNext(){
  const w = nextCv.width, h = nextCv.height;
  nextCtx.clearRect(0, 0, w, h);
  if (!nextKey) return;
  const p = PIECES[nextKey];
  let minC = 9, maxC = -9, minR = 9, maxR = -9;
  for (const [dc, dr] of p.cells){
    minC = Math.min(minC, dc); maxC = Math.max(maxC, dc);
    minR = Math.min(minR, dr); maxR = Math.max(maxR, dr);
  }
  const s = Math.min(26, w/(maxC-minC+1), h/(maxR-minR+1));
  const ox = (w - (maxC-minC+1)*s)/2, oy = (h - (maxR-minR+1)*s)/2;
  // önce tüm dolgular, sonra çizgiler: bitişik karelerin ortak kenarında
  // çizgiler aynı koordinata düştüğü için tek (çift kalınlıkta olmayan) border oluşur
  nextCtx.lineWidth = 2;
  nextCtx.fillStyle = p.color;
  for (const [dc, dr] of p.cells){
    nextCtx.fillRect(ox + (dc-minC)*s, oy + (maxR-dr)*s, s, s);
  }
  nextCtx.strokeStyle = shade(p.color, 0.6);
  for (const [dc, dr] of p.cells){
    nextCtx.strokeRect(ox + (dc-minC)*s, oy + (maxR-dr)*s, s, s);
  }
}
const scoreEl = document.getElementById("scoreVal");
const timeEl = document.getElementById("timeVal");
let shownScore = -1, shownTime = "";
let elapsed = 0; // oynanan süre (sn) — duraklatmada saymaz

/* ================= Girdi: klavye (kendi DAS tekrarı ile) ================= */
const held = {}; // key -> { t: basılı kalma süresi, fired: ilk tekrar oldu mu }
const DAS_MS = 170, ARR_MS = 60;

document.addEventListener("keydown", e => {
  const k = e.key;
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(k)) e.preventDefault();
  if (e.repeat) return;
  Sfx.unlock();
  if (state !== "playing") return;
  if (k === "ArrowLeft"){ tryMove(-1); held[k] = { t: 0, fired: false }; }
  else if (k === "ArrowRight"){ tryMove(1); held[k] = { t: 0, fired: false }; }
  else if (k === "ArrowUp"){ tryRotate(); }
  else if (k === "ArrowDown"){ softDrop = true; }
  else if (k === " "){ hardDrop(); }
});
document.addEventListener("keyup", e => {
  delete held[e.key];
  if (e.key === "ArrowDown") softDrop = false;
});

function processDAS(dtMs){
  if (state !== "playing") return;
  for (const k of Object.keys(held)){
    const h = held[k];
    h.t += dtMs;
    const dir = k === "ArrowLeft" ? -1 : 1;
    if (!h.fired){
      if (h.t >= DAS_MS){ tryMove(dir); h.fired = true; h.t = 0; }
    } else if (h.t >= ARR_MS){ tryMove(dir); h.t = 0; }
  }
}

/* ================= Girdi: dokunmatik ================= */
const canvas = document.getElementById("game");
let touch = null;
canvas.addEventListener("pointerdown", e => {
  Sfx.unlock();
  if (state !== "playing") return;
  touch = { x: e.clientX, y: e.clientY, sx: e.clientX, sy: e.clientY, t: performance.now(), acted: false };
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e => {
  if (!touch || state !== "playing") return;
  const stepPx = Math.max(36, window.innerWidth * 0.07);
  let dx = e.clientX - touch.x;
  while (dx <= -stepPx){ tryMove(-1); touch.x -= stepPx; dx += stepPx; touch.acted = true; }
  while (dx >= stepPx){ tryMove(1); touch.x += stepPx; dx -= stepPx; touch.acted = true; }
});
canvas.addEventListener("pointerup", e => {
  if (!touch) return;
  const dt = performance.now() - touch.t;
  const dxT = e.clientX - touch.sx, dyT = e.clientY - touch.sy;
  if (state === "playing" && !touch.acted){
    if (dyT > 70 && dt < 350 && Math.abs(dxT) < Math.abs(dyT)) hardDrop();       // hızlı aşağı kaydırma
    else if (dt < 260 && Math.abs(dxT) < 12 && Math.abs(dyT) < 12) tryRotate();  // dokunma
  }
  touch = null;
});
canvas.addEventListener("pointercancel", () => { touch = null; });


/* ================= 3D projeksiyon (el yapımı) ================= */
const ctx2d = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
// sabit kamera: kullanıcı tarafından seçilen değerler (açı -8°, uzaklık 40, yükseklik 10)
const CAM_Y = 10;
const CAM_DIST = 40;
const TILT = -8 * Math.PI/180;
const cosT = Math.cos(TILT), sinT = Math.sin(TILT);
let SCALE = 100, OFFX = 0, OFFY = 0;

function projRaw(x, y, z){ // fov=1 ham projeksiyon
  const py = y - CAM_Y;
  const y2 = py*cosT - z*sinT;
  const z2 = py*sinT + z*cosT + CAM_DIST;
  return [x / z2, -y2 / z2, z2];
}
function proj(x, y, z){
  const [px, py, d] = projRaw(x, y, z);
  return [OFFX + px*SCALE, OFFY + py*SCALE, d];
}
function camSpace(x, y, z){ // kamera uzayı noktası (kamera orijinde)
  const py = y - CAM_Y;
  return [x, py*cosT - z*sinT, py*sinT + z*cosT + CAM_DIST];
}

function computeFit(){
  // sığdırma: sınır silindirinin uç noktalarını örnekleyip bbox'a göre ölçekle
  let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
  const rr = R_OUT + 0.6;
  for (let a = 0; a < 24; a++){
    const th = a/24 * Math.PI*2;
    for (const y of [-0.4, ROWS + 2.2]){
      const [px, py] = projRaw(rr*Math.cos(th), y, rr*Math.sin(th));
      minX = Math.min(minX, px); maxX = Math.max(maxX, px);
      minY = Math.min(minY, py); maxY = Math.max(maxY, py);
    }
  }
  SCALE = Math.min(W*0.95/(maxX-minX), H*0.94/(maxY-minY));
  OFFX = W/2 - SCALE*(minX+maxX)/2;
  OFFY = H/2 - SCALE*(minY+maxY)/2;
}

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx2d.setTransform(DPR, 0, 0, DPR, 0, 0);
  computeFit();
}
window.addEventListener("resize", resize);

resize();

/* ================= Çizim ================= */
function poly(pts){
  ctx2d.beginPath();
  ctx2d.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx2d.lineTo(pts[i][0], pts[i][1]);
  ctx2d.closePath();
}

const LIGHT = (() => { const l = [-0.45, 0.75, -0.5]; const n = Math.hypot(...l); return l.map(v => v/n); })();

// dışa bakan birim normali kamera uzayına çevir (yalnızca rotasyon, öteleme yok)
function rotN(n){ return [n[0], n[1]*cosT - n[2]*sinT, n[1]*sinT + n[2]*cosT]; }

const SEGS = 3;                 // silindir kavisi için açısal alt bölme sayısı
const OUTLINE_W = 1.2;          // küp kontur kalınlığı (piksel) — kamera ayarlarından bağımsız
const BG_RGB = [233, 233, 236]; // derinlik sisinin hedef tonu (arka plan rengi)

function shadeFog(hex, k, fog){
  const [r, g, b] = hexToRgb(hex);
  const f = c => k >= 1 ? c + (255-c)*(k-1) : c*k;
  const m = (c, bg) => clamp(Math.round(f(c) + (bg - f(c))*fog), 0, 255);
  return `rgb(${m(r,BG_RGB[0])},${m(g,BG_RGB[1])},${m(b,BG_RGB[2])})`;
}

// Hücreyi silindir kavisine oturan yüzeylerle çizer.
// skip: komşusu dolu olan yüzler hiç çizilmez → bitişik kutular tek parça görünür.
// Derinlik sisi uzaktaki blokları arka plan tonuna çeker → ön/arka ayrımı netleşir.
function drawCell(colCont, row, color, { alpha = 1, bright = 1, outline = true, skip = {} } = {}, yOff = 0){
  const a0 = colCont*DELTA + towerAngle, a1 = a0 + DELTA;
  const y0 = (row + yOff)*CELL_H, y1 = y0 + CELL_H;
  const P = (R, th, y) => [R*Math.cos(th), y, R*Math.sin(th)];
  const arc = (R, y, rev) => {
    const pts = [];
    for (let i = 0; i <= SEGS; i++) pts.push(P(R, a0 + DELTA*i/SEGS, y));
    if (rev) pts.reverse();
    return pts;
  };

  // yüz grupları: alt-dörtgen listesi + hücre sınırı kontur yolu
  const groups = [];
  for (const [R, s] of [[R_OUT, 1], [R_IN, -1]]){ // dış ve iç kavisli yüzeyler
    const quads = [];
    for (let i = 0; i < SEGS; i++){
      const t0 = a0 + DELTA*i/SEGS, t1 = a0 + DELTA*(i+1)/SEGS, tm = (t0 + t1)/2;
      quads.push({ pts: [P(R,t0,y0), P(R,t1,y0), P(R,t1,y1), P(R,t0,y1)], n: [s*Math.cos(tm), 0, s*Math.sin(tm)] });
    }
    groups.push({ quads, border: arc(R, y0, false).concat(arc(R, y1, true)) });
  }
  for (const [y, ny, skipIt] of [[y1, 1, skip.top], [y0, -1, skip.bottom]]){ // üst ve alt
    if (skipIt) continue;
    const quads = [];
    for (let i = 0; i < SEGS; i++){
      const t0 = a0 + DELTA*i/SEGS, t1 = a0 + DELTA*(i+1)/SEGS;
      quads.push({ pts: [P(R_IN,t0,y), P(R_OUT,t0,y), P(R_OUT,t1,y), P(R_IN,t1,y)], n: [0, ny, 0] });
    }
    groups.push({ quads, border: arc(R_IN, y, false).concat(arc(R_OUT, y, true)) });
  }
  for (const [th, skipIt, s] of [[a0, skip.cw, 1], [a1, skip.ccw, -1]]){ // düz yan yüzler
    if (skipIt) continue;
    const pts = [P(R_IN,th,y0), P(R_OUT,th,y0), P(R_OUT,th,y1), P(R_IN,th,y1)];
    groups.push({ quads: [{ pts, n: [s*Math.sin(th), 0, -s*Math.cos(th)] }], border: pts });
  }

  // derinlik sisi katsayısı (hücre merkezinin kameraya uzaklığından)
  const tc = (a0 + a1)/2;
  const cc = camSpace(R_MID*Math.cos(tc), (y0 + y1)/2, R_MID*Math.sin(tc));
  const fog = clamp((cc[2] - (CAM_DIST - R_OUT)) / (2*R_OUT), 0, 1) * 0.55;

  const toScr = p => { const c = camSpace(p[0], p[1], p[2]); return [OFFX + c[0]/c[2]*SCALE, OFFY - c[1]/c[2]*SCALE]; };
  // yarı saydam hücrede (hayalet) alt-dörtgen dikişleri koyu çizgi olarak görünür;
  // bu yüzden yüz grubu tek parça (sınır yolu) olarak, tek renkle doldurulur
  const translucent = alpha < 0.999;
  const fills = [], borders = [];
  for (const g of groups){
    let any = false, groupFill = null;
    for (const q of g.quads){
      const cam = q.pts.map(p => camSpace(p[0], p[1], p[2]));
      const n = rotN(q.n);
      const cx = (cam[0][0]+cam[1][0]+cam[2][0]+cam[3][0])/4;
      const cy = (cam[0][1]+cam[1][1]+cam[2][1]+cam[3][1])/4;
      const cz = (cam[0][2]+cam[1][2]+cam[2][2]+cam[3][2])/4;
      if (n[0]*cx + n[1]*cy + n[2]*cz >= 0) continue; // arkaya bakan alt-yüzey
      any = true;
      const diff = Math.max(0, n[0]*LIGHT[0] + n[1]*LIGHT[1] + n[2]*LIGHT[2]);
      const fill = shadeFog(color, (0.78 + 0.45*diff)*bright, fog);
      groupFill = fill;
      if (!translucent){
        fills.push({ pts: cam.map(c => [OFFX + c[0]/c[2]*SCALE, OFFY - c[1]/c[2]*SCALE]), fill, seal: true });
      }
    }
    if (any){
      if (translucent) fills.push({ pts: g.border.map(toScr), fill: groupFill, seal: false });
      borders.push(g.border.map(toScr));
    } else if (translucent){
      // saydam hücrede arkada kalan kenar/köşe izleri de görünsün
      borders.push(g.border.map(toScr));
    }
  }

  ctx2d.globalAlpha = alpha;
  ctx2d.lineJoin = "round";
  for (const f of fills){ // önce tüm dolgular (dikişler kendi rengiyle kapatılır)
    poly(f.pts);
    ctx2d.fillStyle = f.fill;
    ctx2d.fill();
    if (f.seal){
      ctx2d.strokeStyle = f.fill;
      ctx2d.lineWidth = 1;
      ctx2d.stroke();
    }
  }
  if (outline){ // sonra hücre sınırı konturları: rengin koyu tonu (siyah değil), siste soluklaşır
    ctx2d.strokeStyle = shadeFog(color, 0.6, fog);
    ctx2d.lineWidth = OUTLINE_W;
    for (const b of borders){ poly(b); ctx2d.stroke(); }
  }
  ctx2d.globalAlpha = 1;
}

// hafif zemin gölgesi: kulenin altında yumuşak elips
function drawShadow(){
  const [gx, gy] = proj(0, -0.05, 0);
  const [ex] = proj(R_OUT*1.35, -0.05, 0);
  const rad = Math.max(20, Math.abs(ex - gx));
  const g = ctx2d.createRadialGradient(gx, gy, 0, gx, gy, rad);
  g.addColorStop(0, "rgba(0,0,0,0.10)");
  g.addColorStop(0.7, "rgba(0,0,0,0.05)");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx2d.save();
  // elipsi zemin düzleminin projeksiyonuna yatır
  const [, topY] = proj(0, -0.05, -R_OUT*1.35);
  const [, botY] = proj(0, -0.05, R_OUT*1.35);
  const squashY = Math.max(0.05, Math.abs(botY - topY) / (2*rad));
  ctx2d.translate(gx, gy);
  ctx2d.scale(1, squashY);
  ctx2d.translate(-gx, -gy);
  ctx2d.fillStyle = g;
  ctx2d.fillRect(gx - rad, gy - rad, rad*2, rad*2);
  ctx2d.restore();
}

// kılavuz halkası: iç/dış çember + dilim ayırıcıları (kuleyle birlikte döner)
function drawGuideRing(y, strokeStyle, alpha, lineWidth = 1){
  ctx2d.strokeStyle = strokeStyle;
  ctx2d.lineWidth = lineWidth;
  ctx2d.globalAlpha = alpha;
  for (const R of [R_IN, R_OUT]){
    ctx2d.beginPath();
    for (let i = 0; i <= 72; i++){
      const th = i/72 * Math.PI*2;
      const [px, py] = proj(R*Math.cos(th), y, R*Math.sin(th));
      if (i === 0) ctx2d.moveTo(px, py); else ctx2d.lineTo(px, py);
    }
    ctx2d.closePath();
    ctx2d.stroke();
  }
  for (let c = 0; c < COLS; c++){
    const th = c*DELTA + towerAngle;
    const [x0, y0] = proj(R_IN*Math.cos(th), y, R_IN*Math.sin(th));
    const [x1, y1] = proj(R_OUT*Math.cos(th), y, R_OUT*Math.sin(th));
    ctx2d.beginPath();
    ctx2d.moveTo(x0, y0);
    ctx2d.lineTo(x1, y1);
    ctx2d.stroke();
  }
  ctx2d.globalAlpha = 1;
}

// taban dilimleri: taş paletinden rastgele renklerle içi dolu (her oyunda yeniden karılır)
let baseColors = [];
function randomizeBaseColors(){
  const pal = Object.values(PIECES).map(p => p.color);
  baseColors = Array.from({ length: COLS }, () => pal[Math.floor(Math.random()*pal.length)]);
}
function drawBaseSlots(){
  ctx2d.globalAlpha = 0.40;
  for (let c = 0; c < COLS; c++){
    const a0 = c*DELTA + towerAngle, a1 = a0 + DELTA;
    ctx2d.beginPath();
    for (let i = 0; i <= 4; i++){
      const th = a0 + (a1-a0)*i/4;
      const [px, py] = proj(R_OUT*Math.cos(th), 0, R_OUT*Math.sin(th));
      if (i === 0) ctx2d.moveTo(px, py); else ctx2d.lineTo(px, py);
    }
    for (let i = 4; i >= 0; i--){
      const th = a0 + (a1-a0)*i/4;
      const [px, py] = proj(R_IN*Math.cos(th), 0, R_IN*Math.sin(th));
      ctx2d.lineTo(px, py);
    }
    ctx2d.closePath();
    ctx2d.fillStyle = baseColors[c];
    ctx2d.fill();
  }
  ctx2d.globalAlpha = 1;
}

// tehlike seviyesi: oyunun bitmesine kalan satır sayısına göre 0 (yok) … 3 (kritik)
function dangerLevel(){
  let top = 0;
  for (let r = GRID_H - 1; r >= 0; r--){
    if (grid[r].some(c => c)){ top = r + 1; break; }
  }
  const remaining = ROWS - top;
  if (remaining >= 4) return 0;
  return clamp(4 - remaining, 1, 3); // 3 kaldı→1, 2 kaldı→2, ≤1 kaldı→3
}

function render(now){
  ctx2d.clearRect(0, 0, W, H);
  drawShadow();
  drawBaseSlots();
  drawGuideRing(0, "#888", 0.55);
  if (state === "playing"){
    const lvl = dangerLevel();
    if (lvl > 0){
      // tepe tehlike halkası: baştan itibaren net kırmızı (gri gibi görünmesin),
      // yanıp sönme tabanı yüksek; seviye arttıkça biraz belirginleşir ve hızlanır
      const baseA = [0, 0.24, 0.30, 0.36][lvl];
      const freq = [0, 4, 6, 9][lvl];
      const blink = 0.65 + 0.35*Math.sin(now*freq);
      drawGuideRing(ROWS*CELL_H, "#ff3040", baseA * blink);
    }
  }

  const list = []; // { depth, draw() }
  const pushCell = (colCont, row, color, opts, yOff = 0) => {
    const tc = (colCont + 0.5)*DELTA + towerAngle;
    const d = camSpace(R_MID*Math.cos(tc), (row + yOff + 0.5)*CELL_H, R_MID*Math.sin(tc))[2];
    list.push({ depth: d, draw: () => drawCell(colCont, row, color, opts, yOff) });
  };

  // düşüş animasyonları aynı fazdaysa hücreler kaynaşık çizilir
  const sameFall = (a, b) => a.fallFrom === b.fallFrom && a.fallT === b.fallT;

  // kilitli hücreler
  for (let r = 0; r < GRID_H; r++){
    for (let c = 0; c < COLS; c++){
      const cell = grid[r][c];
      if (!cell) continue;
      let yOff = 0, alpha = 1, bright = 1;
      if (cell.fallFrom > 0){
        const p = clamp((now - cell.fallT)/(FALL_MS/1000), 0, 1);
        yOff = cell.fallFrom * (1 - easeOutCubic(p));
        if (p >= 1) cell.fallFrom = 0;
      }
      if (clearing && clearing.rows.includes(r)){
        // klasik temizleme: halka beyaza çakarak 3 kez yanıp söner
        const p = clamp((now - clearing.t0)/(CLEAR_MS/1000), 0, 1);
        if (Math.floor(p*6) % 2 === 0) bright = 3;
      }
      const up = r+1 < GRID_H ? grid[r+1][c] : null;
      const down = r-1 >= 0 ? grid[r-1][c] : null;
      const skip = {
        cw: !!grid[r][mod(c-1, COLS)],
        ccw: !!grid[r][mod(c+1, COLS)],
        top: !!(up && sameFall(up, cell)),
        bottom: !!(down && sameFall(down, cell)),
      };
      pushCell(c, r, cell.color, { alpha, bright, skip }, yOff);
    }
  }

  if (piece && state === "playing"){
    // parça içi komşu yüzeyler çizilmez → parça yekpare görünür
    const cellSet = new Set(piece.cells.map(([dc, dr]) => dc + "," + dr));
    const skipFor = (dc, dr) => ({
      cw: cellSet.has((dc-1) + "," + dr),
      ccw: cellSet.has((dc+1) + "," + dr),
      top: cellSet.has(dc + "," + (dr+1)),
      bottom: cellSet.has(dc + "," + (dr-1)),
    });
    // gölge (hayalet): ineceği yer belirgin görünsün
    const gRow = dropRow();
    if (gRow < piece.row){
      for (const [dc, dr] of piece.cells){
        pushCell(piece.visCol + dc, gRow + dr, piece.color, { alpha: 0.42, outline: true, skip: skipFor(dc, dr) });
      }
    }
    // düşen parça
    for (const [dc, dr] of piece.cells){
      pushCell(piece.visCol + dc, piece.visRow + dr, piece.color, { bright: 1.08, skip: skipFor(dc, dr) });
    }
  }

  list.sort((a, b) => b.depth - a.depth); // uzaktan yakına (painter's algorithm)
  for (const item of list) item.draw();
}

/* ================= Ana döngü ================= */
function update(dt, now){
  // kule dönüşü: kritik sönümlü yaklaşma (overshoot yok)
  towerAngle += (towerTarget - towerAngle) * Math.min(1, dt*12);

  if (state !== "playing") return;
  elapsed += dt;
  processDAS(dt*1000);

  if (clearing){
    if (now - clearing.t0 >= CLEAR_MS/1000) finishClear();
    return;
  }
  if (!piece) return;

  piece.visRow += (piece.row - piece.visRow) * Math.min(1, dt*16);
  // görsel sütun kuleyle AYNI hızda yumuşar → parça ekranda zıplamadan önde kalır
  piece.visCol += (piece.col - piece.visCol) * Math.min(1, dt*12);

  if (collides(piece.cells, piece.col, piece.row - 1)){
    lockT += dt*1000;
    if (lockT >= LOCK_MS) lockPiece();
  } else {
    lockT = 0;
    gravAcc += dt*1000;
    const interval = softDrop ? SOFT_MS : GRAVITY_MS;
    while (gravAcc >= interval){
      gravAcc -= interval;
      if (!collides(piece.cells, piece.col, piece.row - 1)){
        piece.row--;
        if (softDrop) score++;
      } else break;
    }
  }
}

function frame(t){
  const now = t/1000;
  const dt = Math.min(0.05, now - (lastTime || now));
  lastTime = now;
  update(dt, now);
  render(now);
  if (score !== shownScore){ shownScore = score; scoreEl.textContent = score; }
  const tStr = formatTime(elapsed);
  if (tStr !== shownTime){ shownTime = tStr; timeEl.textContent = tStr; }
  requestAnimationFrame(frame);
}

grid = emptyGrid();
randomizeBaseColors();
requestAnimationFrame(frame);
</script>
